<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le Commandement du Général M.</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #2c3e50; color: white; padding: 50px; }
        #jeu { background: #34495e; padding: 30px; border-radius: 15px; max-width: 600px; margin: auto; }
        button { margin: 10px; padding: 12px 24px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; background-color: #3498db; color: white; }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div id="jeu">
        <h2 id="titre">Chapitre 1 : Libération de Val-Bamba</h2>
        <p id="description">Général M., les 'Ombres' bloquent l'entrée de la cité. Quel est votre ordre ?</p>
        <div id="boutons">
            <button onclick="jeu(1)">Offensive frontale</button>
            <button onclick="jeu(2)">Contournement tactique</button>
        </div>
    </div>

    <script>
        function jeu(choix) {
            let titre = document.getElementById("titre");
            let desc = document.getElementById("description");
            let btnDiv = document.getElementById("boutons");

            if (choix === 1) {
                titre.innerHTML = "Échec !";
                desc.innerHTML = "L'ennemi vous attendait. Vous devez mieux planifier vos assauts.";
                btnDiv.innerHTML = "<button onclick='location.reload()'>Recommencer</button>";
            } 
            else if (choix === 2) {
                titre.innerHTML = "Chapitre 2 : La Traversée du Pont";
                desc.innerHTML = "La ville est libérée, mais les 'Ombres' se replient vers le pont de la rivière. Comment avancez-vous ?";
                btnDiv.innerHTML = `
                    <button onclick="jeu(3)">Traverser rapidement</button>
                    <button onclick="jeu(4)">Envoyer une unité de déminage d'abord</button>
                `;
            }
            else if (choix === 3) {
                titre.innerHTML = "Piège !";
                desc.innerHTML = "Le pont était miné. L'embuscade a été fatale. Mission échouée.";
                btnDiv.innerHTML = "<button onclick='location.reload()'>Recommencer</button>";
            }
            else if (choix === 4) {
                titre.innerHTML = "Victoire !";
                desc.innerHTML = "Vous avez évité le piège. Le pont est sécurisé et la mission est un succès total. Bravo, 
       btnDiv.innerHTML = "<button onclick='jeu(5)'>Continuer vers le QG</button>";⁠     }
               else if (choix === 5) {
                titre.innerHTML = "Chapitre 3 : L'infiltration du QG";
                desc.innerHTML = "Vous arrivez devant le QG des Ombres. Le périmètre est fortement gardé. Comment procédez-vous ?";
                btnDiv.innerHTML = `
                    <button onclick="jeu(7)">Utiliser les égouts (Furtivité)</button>
                    <button onclick="jeu(8)">Diversion à la porte principale (Force)</button>
                `;
            }
            else if (choix === 7) {
                titre.innerHTML = "Dans l'ombre...";
                desc.innerHTML = "Vous avez réussi à pénétrer dans le QG sans être vu. Vous êtes maintenant dans la salle des serveurs.";
                btnDiv.innerHTML = "<button onclick='jeu(9)'>Pirater les données</button>";
            }
            else if (choix === 8) {
                titre.innerHTML = "Le combat fait rage !";
                desc.innerHTML = "L'ennemi a été pris au dépourvu, mais ils sont trop nombreux. Vous êtes coincé !";
                btnDiv.innerHTML = "<button onclick='location.reload()'>Recommencer</button>";
            }
     }
            else if (choix === 9) {
                titre.innerHTML = "Chapitre 4 : L'évasion";
                desc.innerHTML = "Le téléchargement est terminé, mais les alarmes retentissent ! Les gardes arrivent dans le couloir. Que faites-vous ?";
                btnDiv.innerHTML = `
                    <button onclick="jeu(10)">Sauter par la fenêtre (Risqué)</button>
                    <button onclick="jeu(11)">Se cacher dans le conduit d'aération</button>
                `;
             else if (choix === 10) {
                titre.innerHTML = "Chapitre 5 : Le combat";
                desc.innerHTML = "Les gardes approchent ! Vos soldats se mettent en position, commencent à tirer et se déplacent pour contourner l'ennemi. Que faites-vous ?";
                btnDiv.innerHTML = `
                    <button onclick="jeu(12)">Appuyer l'attaque avec un tir de couverture</button>
                    <button onclick="jeu(13)">Changer de position stratégique</button>
                `;
            }
           }
            else if (choix === 12) {
                titre.innerHTML = "Chapitre 6 : Attaque tactique";
                desc.innerHTML = "Tes tirs de couverture permettent à tes soldats d'avancer. La zone est presque nettoyée !";
                btnDiv.innerHTML = "<button onclick='jeu(14)'>Sécuriser la zone</button>";
            }
            else if (choix === 13) {
                titre.innerHTML = "Chapitre 6 : Manœuvre de flanc";
                desc.innerHTML = "En changeant de position, tu surprends l'ennemi. Ils battent en retraite !";
                btnDiv.innerHTML = "<button onclick='jeu(14)'>Poursuivre l'ennemi</button>";
            }
            else if (choix === 14) {
                titre.innerHTML = "Chapitre 7 : La découverte";
                desc.innerHTML = "En sécurisant la zone, vous trouvez une mallette contenant les plans secrets du projet ennemi. Que faites-vous ?";
                btnDiv.innerHTML = `
                    <button onclick="jeu(15)">Ouvrir la mallette</button>
                    <button onclick="jeu(16)">Attendre les renforts pour l'ouvrir</button>
                `;
            }
            else if (choix === 15) {
                titre.innerHTML = "Chapitre 8 : Le contenu";
                desc.innerHTML = "La mallette contient des codes de lancement ! Vous devez agir vite.";
                btnDiv.innerHTML = "<button onclick='jeu(17)'>Désactiver les codes</button>";
            }
            else if (choix === 16) {
                titre.innerHTML = "Chapitre 8 : Renforts";
                desc.innerHTML = "Les renforts arrivent et sécurisent la mallette. Vous avez réussi à contenir la menace.";
                btnDiv.innerHTML = "<button onclick='jeu(18)'>Terminer la mission</button>";
            }
            else if (choix === 17) {
                titre.innerHTML = "Chapitre 9 : Désactivation";
                desc.innerHTML = "Les codes sont désactivés in extremis. La menace mondiale est écartée !";
                btnDiv.innerHTML = "<button onclick='jeu(19)'>Vers la fin</button>";
            }
            else if (choix === 18) {
                titre.innerHTML = "Chapitre 9 : Victoire";
                desc.innerHTML = "La mission est un succès total, les Ombres sont neutralisées.";
                btnDiv.innerHTML = "<button onclick='jeu(19)'>Vers la fin</button>";
            }
             
            }
            else if (choix === 19) {
                titre.innerHTML = "Chapitre 10 : Le sacrifice final";
                desc.innerHTML = "Le Général s'écroule sous les balles ennemies. Vos soldats s'arrêtent, les larmes aux yeux, saluant une dernière fois leur chef tombé au combat. La mission est un succès, mais le cœur n'y est plus.";
                btnDiv.innerHTML = "<button onclick='location.reload()'>Recommencer</button>";
            }
 </script>   
</body>
</html>
